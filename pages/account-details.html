<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="../assets/css/details.css" />

  <body>
    <header class="header">
      <a class="logo" href="index.html">
        <img
          src="../assets/images/SleekCircuit_white_transparent.png"
          id="logo"
        />
      </a>
      <nav class="nav">
        <div class="dropdown">
          <a href="#">Shop</a>
          <div class="dropdown-content">
            <a href="#">Phones</a>
            <a href="#">Tablets</a>
            <a href="#">/More</a>
          </div>
        </div>

        <div class="dropdown">
          <a href="#">Lorem</a>
          <div class="dropdown-content">
            <a href="#">ipsum</a>
            <a href="#">dolor sit</a>
            <a href="#">amet</a>
          </div>
        </div>
      </nav>

      <div class="search-bar">
        <input type="text" placeholder="Search..." id="search-input" />
        <button class="search-btn" id="search-btn">Search</button>
      </div>

      <div class="auth-buttons">
        <a href="cart.html" class="btn-cart">Cart</a>

          <div class="account-card">
            <p>

            <p><strong>Email:</strong> <span id="account-email">-</span></p>
            <p><strong>User ID:</strong> <span id="account-uid">-</span></p>

    <footer>
      <p>© 2025 - 2026 SleekCircuit</p>
