<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>

  <body>
    <div class="container">
      <div class="container-header">
        <img
          src="../assets/images/SleekCircuit_white_transparent.png"
          id="logo"
        />
        <a href="../pages/index.html" class="back-home">Home</a>
        <div class="user-widget user-dropdown" id="user-widget" hidden>
          <span class="avatar" id="user-avatar"></span>
          <span class="username" id="user-name"></span>
          <div class="user-dropdown-content">
            <a href="../pages/account-details.html">Account details</a>
            <button type="button" id="logout-button">Logout</button>
          </div>
        </div>
      </div>

      <h2>Login</h2>
      <form>
        <div>
          <div class="text">Email</div>
          <div class="asterisk">*</div>
        </div>
        <input type="email" placeholder="Email" id="email" />
        <span class="error-text" id="email-error"></span>

        <div>
          <div class="text">Password</div>
          <div class="asterisk">*</div>
        </div>
        <input type="password" placeholder="Password" id="password" />
        <span class="error-text" id="password-error"></span>

        <button type="submit" id="login-btn">Login</button>
      </form>
      <div class="or-separator">
        <span>or</span>
      </div>
      <div class="oauth">
        <button type="button" id="google-signin-btn" class="google-btn">
          <span class="google-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                fill="#4285F4"
                d="M23.64 12.2c0-.78-.07-1.53-.2-2.26H12.18v4.28h6.22c-.27 1.43-1.08 2.64-2.3 3.45v2.88h3.72c2.17-2 3.42-4.94 3.42-8.35z"
              />
              <path
                fill="#34A853"
                d="M12.18 24c2.88 0 5.3-.94 7.06-2.56l-3.72-2.88c-1.04.7-2.37 1.12-3.34 1.12-2.57 0-4.75-1.74-5.53-4.08H3.72v2.56C5.44 21.97 8.55 24 12.18 24z"
              />
              <path
                fill="#FBBC05"
                d="M6.65 14.6c-.24-.7-.38-1.45-.38-2.22s.14-1.52.38-2.22V7.6H3.72C2.63 9.54 2 11.7 2 14s.63 4.46 1.72 6.4l2.93-2.56z"
              />
              <path
                fill="#EA4335"
                d="M12.18 4.8c1.56 0 2.95.54 4.05 1.6l3.03-3.03C17.5 1.72 15.08 1 12.18 1 8.55 1 5.44 3.03 3.72 6.4l2.93 2.56c.78-2.34 2.96-4.08 5.53-4.08z"
              />
            </svg>
          </span>
          <span>Sign in with Google</span>
        </button>
      </div>
      <p>
        Don't have an account?
        <a href="../pages/register.html">Register here</a>
      </p>
      <p><a href="../pages/index.html">Continue as Guest</a></p>
    </div>
    <script type="module" src="../assets/js/firebase_config.js"></script>
    <script type="module" src="../assets/js/user_header.js"></script>
    <script type="module" src="../assets/js/login.js"></script>
  </body>
</html>
