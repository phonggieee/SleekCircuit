<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - SleekCircuit</title>
    <link rel="stylesheet" href="../assets/css/index.css" />
    <link rel="stylesheet" href="../assets/css/cart.css" />
  </head>

  <body>
    <header class="header">
      <a class="logo" href="index.html">
        <img
          src="../assets/images/SleekCircuit_white_transparent.png"
          id="logo"
        />
      </a>
      <nav class="nav">
        <div class="dropdown">
          <a href="#">Shop</a>
          <div class="dropdown-content">
            <a href="#">Phones</a>
            <a href="#">Tablets</a>
            <a href="#">/More</a>
          </div>
        </div>

        <div class="dropdown">
          <a href="#">Lorem</a>
          <div class="dropdown-content">
            <a href="#">ipsum</a>
            <a href="#">dolor sit</a>
            <a href="#">amet</a>
          </div>
        </div>
      </nav>

      <div class="search-bar">
        <input type="text" placeholder="Search..." id="search-input" />
        <button class="search-btn" id="search-btn">Search</button>
      </div>

      <div class="auth-buttons">
        <div class="user-widget user-dropdown" id="user-widget" hidden>
          <span class="avatar" id="user-avatar"></span>
          <span class="username" id="user-name"></span>
          <div class="user-dropdown-content">
            <a href="account-details.html">Account details</a>
            <button type="button" id="logout-button">Logout</button>
          </div>
        </div>
        <a href="../pages/login.html" class="btn-login">Login</a>
        <a href="../pages/register.html" class="btn-register">Register</a>
      </div>
    </header>

    <section class="cart-container">
      <h1>Your Cart</h1>
      <div id="cart-items"></div>
      <div id="cart-total">Total: $0.00</div>
      <button id="checkout-btn">Checkout</button>
    </section>

    <footer>
      <p>©2026 SleekCircuit</p>
    </footer>

    <script type="module" src="../assets/js/firebase_config.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
    <script type="module" src="../assets/js/user_header.js"></script>
    <script type="module" src="../assets/js/products.js"></script>
    <script type="module" src="../assets/js/cart.js"></script>
  </body>
</html>
